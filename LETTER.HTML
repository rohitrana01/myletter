<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Envelope</title>

<style>
:root {
  --flap-bg: #0077cc;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f2f2f2;
  font-family: Arial, sans-serif;
}

/* Popup */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.popup-box {
  background: #fff;
  padding: 25px;
  border-radius: 15px;
  width: 320px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,.3);
}

.popup-box input {
  width: 90%;
  padding: 12px;
  margin: 15px 0;
  border: 1px solid #ccc;
  border-radius: 8px;
}

.popup-box button {
  padding: 12px 25px;
  border: none;
  border-radius: 8px;
  background: #0077cc;
  color: white;
  cursor: pointer;
}

/* Envelope */
.envelope-container {
  perspective: 1500px;
  cursor: pointer;
}

.envelope {
  width: 400px;
  height: 260px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1s ease-in-out;
}

/* Front */
.front {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('https://rohitrana01.github.io/myletter/.jpeg');
  background-size: cover;
  background-position: center;
  border: 2px solid #ccc;
  border-radius: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  backface-visibility: hidden;
  z-index: 1;
}

.front .logo img {
  width: 120px;
  height: auto;
  margin-bottom: 15px;
}

.front .details {
  font-size: 1.4em;
  font-weight: bold;
  background: rgba(255,255,255,0.85);
  padding: 8px 15px;
  border-radius: 10px;
}

/* Back */
.back {
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('https://rohitrana01.github.io/myletter/.jpeg');
  background-size: cover;
  background-position: center;
  border: 2px solid #ccc;
  border-radius: 20px;
  backface-visibility: hidden;
  transform: rotateY(180deg);
  overflow: hidden;
}

.flap {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: var(--flap-bg);
  clip-path: polygon(0 0, 100% 0, 50% 50%);
  transform-origin: top;
  transition: transform 1s;
  z-index: 3;
}

/* Letter */
.letter {
  position: absolute;
  bottom: -100%;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  height: 100%;
  background: #fff;
  z-index: 2;
  transition: bottom 1.5s ease-out, opacity 1s;
  opacity: 0;
  border-radius: 12px;
  overflow: hidden;
}

/* Full image without cropping */
.letter-image {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center;
}

/* Name */
.name-section {
  position: absolute;
  top: 10px;
  left: 15px;
  z-index: 5;
  font-size: 22px;
  font-weight: bold;
  color: #000;
  text-shadow: 1px 1px 4px rgba(255,255,255,0.9);
}

/* Best wishes */
.wish-section {
  position: absolute;
  bottom: 10px;
  left: 0;
  width: 100%;
  text-align: center;
  z-index: 5;
  font-size: 20px;
  font-weight: bold;
  color: #000;
  text-shadow: 1px 1px 4px rgba(255,255,255,0.9);
}

/* Open animation */
.envelope.open .flap {
  transform: rotateX(-180deg);
}

.envelope.open .letter {
  bottom: 0;
  opacity: 1;
}
</style>
</head>

<body>

<!-- Name Popup -->
<div class="popup" id="namePopup">
  <div class="popup-box">
    <h2>Enter Your Name</h2>
    <input type="text" id="nameInput" placeholder="Your Name">
    <br>
    <button id="startBtn">Continue</button>
  </div>
</div>

<div class="envelope-container">
  <div class="envelope" id="envelope">

    <!-- Front -->
    <div class="front">
      <div class="logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a7/React-icon.svg" alt="Logo">
      </div>

      <div class="details">
        To: <span id="recipientName">Friend</span>
      </div>
    </div>

    <!-- Back -->
    <div class="back">
      <div class="flap"></div>

      <div class="letter">

        <img
          src="https://rohitrana01.github.io/myletter/1.jpeg"
          class="letter-image"
          alt="Letter Image"
        >

        <div class="name-section">
          Dear <span id="letterName">Friend</span>,
        </div>

        <div class="wish-section">
          ❤️ Best Wishes ❤️
        </div>

      </div>
    </div>

  </div>
</div>

<script>
const envelope = document.getElementById("envelope");
let clickCount = 0;

document.getElementById("startBtn").addEventListener("click", function() {
  let name = document.getElementById("nameInput").value.trim();

  if (name === "") {
    name = "Friend";
  }

  document.getElementById("recipientName").textContent = name;
  document.getElementById("letterName").textContent = name;

  document.getElementById("namePopup").style.display = "none";
});

envelope.addEventListener("click", () => {
  clickCount++;

  if (clickCount === 1) {
    envelope.style.transform = "rotateY(180deg)";
  } else if (clickCount === 2) {
    envelope.classList.add("open");
  }
});
</script>

</body>
</html>
