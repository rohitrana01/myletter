<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Envelope</title>

<style>
:root {
  --flap-bg: #0077cc;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f2f2f2;
  font-family: Arial, sans-serif;
}

/* Popup */
.popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.popup-box {
  background: #fff;
  padding: 25px;
  border-radius: 15px;
  width: 320px;
  text-align: center;
}

/* Envelope */
.envelope-container {
  perspective: 1500px;
  cursor: pointer;
}

.envelope {
  width: 400px;
  height: 260px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1s ease-in-out;
}

/* Front */
.front {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #e0f0ff, #b3d9ff);
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* Back */
.back {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #e0f0ff, #b3d9ff);
  border-radius: 20px;
  transform: rotateY(180deg);
  overflow: hidden;
}

/* Flap */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: var(--flap-bg);
  clip-path: polygon(0 0, 100% 0, 50% 50%);
  transform-origin: top;
  transition: transform 1s;
  z-index: 3;
}

/* Letter */
.letter {
  position: absolute;
  inset: 0;
  background: white;
  z-index: 2;
  opacity: 0;
  transition: bottom 1s, opacity 1s;
}

/* Image */
.letter-image {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  opacity: 0.9;
}

/* Name */
.name-section {
  position: absolute;
  top: 10px;
  left: 15px;
  z-index: 5;
  font-size: 22px;
  font-weight: bold;
  color: #000;
  text-shadow: 1px 1px 4px white;
}

/* FIXED: Best wishes moved to LEFT bottom */
.wish-section {
  position: absolute;
  bottom: 10px;
  left: 15px;
  right: auto;
  text-align: left;
  z-index: 5;
  font-size: 18px;
  font-weight: bold;
  color: #000;
  text-shadow: 1px 1px 4px white;
}

/* Open animation */
.envelope.open .flap {
  transform: rotateX(-180deg);
}

.envelope.open .letter {
  opacity: 1;
}

/* transform step */
.envelope.flip {
  transform: rotateY(180deg);
}
</style>
</head>

<body>

<div class="popup" id="namePopup">
  <div class="popup-box">
    <h2>Enter Your Name</h2>
    <input type="text" id="nameInput" placeholder="Your Name">
    <br><br>
    <button id="startBtn">Continue</button>
  </div>
</div>

<div class="envelope-container">
  <div class="envelope" id="envelope">

    <div class="front">
      <div class="details">
        To: <span id="recipientName">Friend</span>
      </div>
    </div>

    <div class="back">
      <div class="flap"></div>

      <div class="letter">
        <img src="https://rohitrana01.github.io/myletter/1.jpeg" class="letter-image">

        <div class="name-section">
          Dear <span id="letterName">Friend</span>,
        </div>

        <div class="wish-section">
          ❤️ Best Wishes ❤️
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const envelope = document.getElementById("envelope");

document.getElementById("startBtn").addEventListener("click", () => {
  let name = document.getElementById("nameInput").value.trim();
  if (!name) name = "Friend";

  document.getElementById("recipientName").textContent = name;
  document.getElementById("letterName").textContent = name;

  document.getElementById("namePopup").style.display = "none";
});

let clickCount = 0;

envelope.addEventListener("click", () => {
  clickCount++;

  if (clickCount === 1) {
    envelope.classList.add("flip");
  }

  if (clickCount === 2) {
    envelope.classList.add("open");
  }
});
</script>

</body>
</html>
