<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Greeting Letter</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: #f2f2f2;
  font-family: Arial, sans-serif;
}

/* Input bar */
.top-bar {
  margin-bottom: 15px;
  display: flex;
  gap: 10px;
}

.top-bar input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.top-bar button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  background: #0077cc;
  color: white;
  cursor: pointer;
}

/* Envelope container */
.envelope-container {
  perspective: 1500px;
  cursor: pointer;
}

.envelope {
  width: 400px;
  height: 260px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1s ease;
}

/* Front */
.front {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #e0f0ff, #b3d9ff);
  border-radius: 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
}

/* Back */
.back {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #e0f0ff, #b3d9ff);
  border-radius: 20px;
  transform: rotateY(180deg);
  overflow: hidden;
}

/* Flap */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #0077cc;
  clip-path: polygon(0 0, 100% 0, 50% 50%);
  transform-origin: top;
  transition: transform 1s;
  z-index: 3;
}

/* Letter */
.letter {
  position: absolute;
  inset: 0;
  background: white;
  opacity: 0;
  transition: 1s;
  z-index: 2;

  padding: 12px;
  box-sizing: border-box;
}

/* Image FIXED */
.letter img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  background: white;
}

/* Name text */
.name-section {
  position: absolute;
  top: 10px;
  left: 15px;
  z-index: 5;
  font-size: 22px;
  font-weight: bold;
  text-shadow: 1px 1px 4px white;
}

/* Best wishes FIXED left */
.wish-section {
  position: absolute;
  bottom: 10px;
  left: 15px;
  z-index: 5;
  font-size: 18px;
  font-weight: bold;
  text-shadow: 1px 1px 4px white;
}

/* Animations */
.envelope.flip {
  transform: rotateY(180deg);
}

.envelope.open .flap {
  transform: rotateX(-180deg);
}

.envelope.open .letter {
  opacity: 1;
}
</style>
</head>

<body>

<!-- Name input (safe, non-blocking) -->
<div class="top-bar">
  <input id="nameInput" placeholder="Enter your name">
  <button onclick="applyName()">Apply</button>
</div>

<!-- Envelope -->
<div class="envelope-container">
  <div class="envelope" id="envelope">

    <div class="front">
      To: <span id="toName">Friend</span>
    </div>

    <div class="back">
      <div class="flap"></div>

      <div class="letter">
        <img src="https://rohitrana01.github.io/Greetings/1.jpeg" alt="Letter Image">

        <div class="name-section">
          Dear <span id="letterName">Friend</span>,
        </div>

        <div class="wish-section">
          ❤️ Best Wishes ❤️
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const envelope = document.getElementById("envelope");
let clicked = 0;

function applyName() {
  const name = document.getElementById("nameInput").value.trim();
  const finalName = name || "Friend";

  document.getElementById("toName").textContent = finalName;
  document.getElementById("letterName").textContent = finalName;
}

envelope.addEventListener("click", () => {
  clicked++;

  if (clicked === 1) {
    envelope.classList.add("flip");
  }

  if (clicked === 2) {
    envelope.classList.add("open");
  }
});
</script>

</body>
</html>
